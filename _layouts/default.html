<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

  {% feed_meta %}
  {% seo %}
</head>
<body>
  <header class="site-header">
    <div class="container site-header-inner">
      <a href="{{ '/' | relative_url }}" class="site-logo">{{ site.title }}</a>
      <nav>
        <ul class="site-nav">
          {% for item in site.nav %}
            <li>
              <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}. Built with <a href="https://jekyllrb.com">Jekyll</a>.</p>
    </div>
  </footer>
</body>
</html>
