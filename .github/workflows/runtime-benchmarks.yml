name: Runtime Benchmarks

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'test_framework/scripts/run_agent_runtime_benchmarks.sh'
      - '.github/workflows/runtime-benchmarks.yml'

permissions:
  contents: read

jobs:
  runtime-benchmarks:
    name: Runtime Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js 20 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run runtime benchmarks
        run: |
          cd test_framework
          chmod +x scripts/run_agent_runtime_benchmarks.sh
          ./scripts/run_agent_runtime_benchmarks.sh 2>&1 | tee benchmark_run.log

      - name: Generate job summary
        if: always()
        run: |
          cd test_framework
          LATEST=$(ls -td benchmark_results/*-agent-runtime/ 2>/dev/null | head -1)

          echo "## Runtime Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -z "$LATEST" ]; then
            echo "_No benchmark results directory found._" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          JSON_FILE="${LATEST}agent_runtime_benchmark_results.json"

          if [ -f "$JSON_FILE" ] && command -v jq &>/dev/null; then
            # ── Cold Start Comparison Table (sorted by cold_start_time) ──
            echo "### Cold Start Comparison" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| Platform | Cold Start (ms) | Idle Mem (MB) | Active Mem (MB) | Install (KB) |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------|-----------------|---------------|-----------------|-------------|" >> "$GITHUB_STEP_SUMMARY"

            jq -r '\
              [.metrics[] | select(.metric == "cold_start_time" or .metric == "memory_idle_mb" or .metric == "memory_active_mb" or .metric == "install_footprint")]\
              | group_by(.platform)\
              | map({\
                  platform: .[0].platform,\
                  cold_start: ((map(select(.metric == "cold_start_time")) | .[0].value) // 0),\
                  idle_mem:   ((map(select(.metric == "memory_idle_mb"))   | .[0].value) // "-"),\
                  active_mem: ((map(select(.metric == "memory_active_mb")) | .[0].value) // "-"),\
                  install:    ((map(select(.metric == "install_footprint")) | .[0].value) // 0)\
                })\
              | sort_by(.cold_start)\
              | .[]\
              | "| \(.platform) | \(.cold_start) | \(.idle_mem) | \(.active_mem) | \(.install) |"\
            ' "$JSON_FILE" >> "$GITHUB_STEP_SUMMARY"

            echo "" >> "$GITHUB_STEP_SUMMARY"

            # ── Full Markdown Report (appended) ──
            MD_FILE="${LATEST}agent_runtime_benchmark_results.md"
            if [ -f "$MD_FILE" ]; then
              echo "<details>" >> "$GITHUB_STEP_SUMMARY"
              echo "<summary>Full Report</summary>" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              cat "$MD_FILE" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "_JSON results not available — skipping summary table._" >> "$GITHUB_STEP_SUMMARY"
            MD_FILE="${LATEST}agent_runtime_benchmark_results.md"
            if [ -f "$MD_FILE" ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              cat "$MD_FILE" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-benchmark-results-${{ github.sha }}
          path: test_framework/benchmark_results/
          retention-days: 60
