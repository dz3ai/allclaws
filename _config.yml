# Site settings
title: allclaws
description: Multi-agent AI framework
baseurl: ""
url: "https://dz3ai.github.io/allclaws"

# Timezone
timezone: Asia/Shanghai

# Author
author:
  name: Danny Zeng
  url: https://github.com/dz3ai

# Build settings
markdown: kramdown
theme: null
future: false
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - .gitmodules

# Blog settings
paginate: 10
paginate_path: "/blog/page/:num/"

# Navigation
nav:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: GitHub
    url: https://github.com/dz3ai/allclaws
